<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1c1c1c;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 0 20px rgba(255, 122, 0, 0.3);
        }

        h2 {
            text-align: center;
            color: #ff7a00;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff7a00;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #e66b00;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            color: #ff7a00;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>LOGIN</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/register">Register</a>
    </div>
</div>

</body>
</html>
